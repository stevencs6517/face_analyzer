<!DOCTYPE html>
<html>
<head>
    <title>Aesthetics Engine Pro - Live Tracking</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js"></script>
    <style>
        body { font-family: monospace; background: #050505; color: #ededed; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { position: relative; width: 640px; height: 480px; margin-bottom: 20px; }
        #webcam { position: absolute; top: 0; left: 0; width: 640px; height: 480px; border-radius: 8px; border: 1px solid #333; object-fit: cover; z-index: 1; transform: scaleX(-1); }
        #output_canvas { position: absolute; top: 0; left: 0; width: 640px; height: 480px; border-radius: 8px; z-index: 2; transform: scaleX(-1); }
        
        #controls { margin-top: 10px; z-index: 10; }
        button { background: #fff; color: #000; border: none; padding: 14px 28px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: background 0.2s; letter-spacing: 1px; }
        button:hover:not(:disabled) { background: #ccc; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        
        #final-score-container { display: none; width: 640px; text-align: center; background: #111; padding: 20px; border-radius: 8px; border: 1px solid #444; margin-top: 20px; }
        .score-display { font-size: 48px; font-weight: bold; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); margin: 10px 0; }
        
        #live-stats { width: 640px; margin-top: 20px; background: #0a0a0a; padding: 15px; border-radius: 8px; border: 1px solid #222; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { background: #151515; padding: 12px; border-radius: 6px; border-left: 4px solid #333; }
        .stat-name { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 18px; font-weight: bold; }
        .stat-target { font-size: 10px; color: #555; display: block; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>
    
    <div id="controls">
        <button id="actionBtn" disabled>Initializing AI...</button>
    </div>

    <div id="final-score-container">
        <div style="font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 2px;">Overall Clinical Rating</div>
        <div class="score-display" id="final-score-text">0.0 / 10</div>
        <div id="score-classification" style="font-size: 18px; font-weight: bold;"></div>
    </div>

    <div id="live-stats">
        <div class="stat-grid">
            <div class="stat-box" id="box-fwhr">
                <div class="stat-name">FWHR</div>
                <div class="stat-value" id="val-fwhr">--</div>
                <span class="stat-target">Target: 1.85 - 1.95</span>
            </div>
            <div class="stat-box" id="box-tilt">
                <div class="stat-name">Canthal Tilt (Avg)</div>
                <div class="stat-value" id="val-tilt">--</div>
                <span class="stat-target">Target: Positive (+3&deg; to +8&deg;)</span>
            </div>
            <div class="stat-box" id="box-lower">
                <div class="stat-name">Chin-to-Philtrum</div>
                <div class="stat-value" id="val-lower">--</div>
                <span class="stat-target">Target: ~2.25 : 1</span>
            </div>
            <div class="stat-box" id="box-midface">
                <div class="stat-name">Midface Ratio</div>
                <div class="stat-value" id="val-midface">--</div>
                <span class="stat-target">Target: ~1.0</span>
            </div>
            <div class="stat-box" id="box-eyes">
                <div class="stat-name">Eye Spacing Ratio</div>
                <div class="stat-value" id="val-eyes">--</div>
                <span class="stat-target">Target: ~1.0 (One eye width)</span>
            </div>
            <div class="stat-box" id="box-jaw">
                <div class="stat-name">Jaw-to-Cheek Ratio</div>
                <div class="stat-value" id="val-jaw">--</div>
                <span class="stat-target">Target: 0.85 - 0.95</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        const video = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const actionBtn = document.getElementById('actionBtn');
        const finalScoreContainer = document.getElementById('final-score-container');
        
        let faceLandmarker;
        let isLive = true;
        let latestGrades = []; // Stores the points for the final calculation

        // Ensure canvas matches video dimensions
        canvasElement.width = 640;
        canvasElement.height = 480;

        function calculateDistance(pt1, pt2) {
            return Math.sqrt(Math.pow(pt2.x - pt1.x, 2) + Math.pow(pt2.y - pt1.y, 2));
        }

        // --- RUTHLESS GRADING LOGIC (Assigns points 0 to 10 for each metric) ---
        
        function gradeMetric(value, idealMin, idealMax, avgMin, avgMax) {
            if (value >= idealMin && value <= idealMax) return { score: 10, color: "#4ade80" }; // Ideal
            if (value >= avgMin && value <= avgMax) return { score: 6, color: "#fbbf24" };   // Average
            return { score: 3, color: "#ef4444" }; // Sub-Optimal
        }

        async function initializeApp() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numFaces: 1
            });

            navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", () => {
                    actionBtn.innerText = "Lock & Rate";
                    actionBtn.disabled = false;
                    predictWebcam();
                });
            });
        }

        let lastVideoTime = -1;

        async function predictWebcam() {
            if (!isLive) return; // Stop loop if user locked the results

            let startTimeMs = performance.now();
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, startTimeMs);
                
                // Clear the canvas
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                if (results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    
                    // Draw the live geometric mesh
                    const drawingUtils = new DrawingUtils(canvasCtx);
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_TESSELATION, { color: "#ffffff30", lineWidth: 1 });
                    drawingUtils.drawConnectors(landmarks, FaceLandmarker.FACE_LANDMARKS_CONTOURS, { color: "#4ade80", lineWidth: 2 });

                    // --- LIVE CALCULATIONS ---
                    
                    // 1. FWHR
                    const fwhr = calculateDistance(landmarks[234], landmarks[454]) / calculateDistance(landmarks[10], landmarks[0]);
                    const gradeFWHR = gradeMetric(fwhr, 1.85, 1.95, 1.70, 2.05);
                    
                    // 2. Canthal Tilt
                    const leftTilt = Math.atan2(landmarks[133].y - landmarks[33].y, Math.abs(landmarks[33].x - landmarks[133].x)) * (180 / Math.PI);
                    const rightTilt = Math.atan2(landmarks[362].y - landmarks[263].y, Math.abs(landmarks[263].x - landmarks[362].x)) * (180 / Math.PI);
                    const tilt = (leftTilt + rightTilt) / 2;
                    const gradeTilt = gradeMetric(tilt, 3, 8, -1, 10);

                    // 3. Chin-to-Philtrum
                    const lowerThird = calculateDistance(landmarks[17], landmarks[152]) / calculateDistance(landmarks[2], landmarks[0]);
                    const gradeLower = gradeMetric(lowerThird, 2.15, 2.35, 1.9, 2.6);

                    // 4. Midface
                    const midface = calculateDistance(landmarks[468], landmarks[473]) / calculateDistance(landmarks[8], landmarks[0]);
                    const gradeMidface = gradeMetric(midface, 0.95, 1.05, 0.85, 1.15);

                    // 5. Eye Spacing (Intercanthal width / Eye width)
                    const intercanthal = calculateDistance(landmarks[133], landmarks[362]);
                    const eyeWidth = calculateDistance(landmarks[33], landmarks[133]);
                    const esr = intercanthal / eyeWidth;
                    const gradeESR = gradeMetric(esr, 0.95, 1.05, 0.85, 1.2);

                    // 6. Jaw-to-Cheek Ratio (Bigonial / Bizygomatic)
                    const jawWidth = calculateDistance(landmarks[132], landmarks[361]);
                    const cheekWidth = calculateDistance(landmarks[234], landmarks[454]);
                    const jawRatio = jawWidth / cheekWidth;
                    const gradeJaw = gradeMetric(jawRatio, 0.85, 0.95, 0.75, 1.0);

                    // Update Live DOM
                    document.getElementById('val-fwhr').innerText = fwhr.toFixed(2);
                    document.getElementById('box-fwhr').style.borderLeftColor = gradeFWHR.color;

                    document.getElementById('val-tilt').innerText = `${tilt > 0 ? '+' : ''}${tilt.toFixed(1)}°`;
                    document.getElementById('box-tilt').style.borderLeftColor = gradeTilt.color;

                    document.getElementById('val-lower').innerText = `${lowerThird.toFixed(2)} : 1`;
                    document.getElementById('box-lower').style.borderLeftColor = gradeLower.color;

                    document.getElementById('val-midface').innerText = midface.toFixed(2);
                    document.getElementById('box-midface').style.borderLeftColor = gradeMidface.color;

                    document.getElementById('val-eyes').innerText = esr.toFixed(2);
                    document.getElementById('box-eyes').style.borderLeftColor = gradeESR.color;

                    document.getElementById('val-jaw').innerText = jawRatio.toFixed(2);
                    document.getElementById('box-jaw').style.borderLeftColor = gradeJaw.color;

                    // Store latest grades for the final rating
                    latestGrades = [gradeFWHR.score, gradeTilt.score, gradeLower.score, gradeMidface.score, gradeESR.score, gradeJaw.score];
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        // --- THE "LOCK & RATE" ACTION ---
        actionBtn.addEventListener('click', () => {
            if (isLive) {
                // LOCK IT
                isLive = false;
                video.pause();
                actionBtn.innerText = "Reset Scanner";
                
                // Calculate Final Honest Score
                if (latestGrades.length > 0) {
                    const totalScore = latestGrades.reduce((a, b) => a + b, 0);
                    const finalRating = (totalScore / latestGrades.length).toFixed(1); // Out of 10
                    
                    document.getElementById('final-score-text').innerText = `${finalRating} / 10`;
                    
                    const classificationEl = document.getElementById('score-classification');
                    if (finalRating >= 8.5) {
                        classificationEl.innerText = "Top Percentile (Ideal Proportions)";
                        classificationEl.style.color = "#4ade80";
                    } else if (finalRating >= 5.5) {
                        classificationEl.innerText = "Average (Standard Facial Harmony)";
                        classificationEl.style.color = "#fbbf24";
                    } else {
                        classificationEl.innerText = "Sub-Optimal (Lacking Harmony)";
                        classificationEl.style.color = "#ef4444";
                    }

                    finalScoreContainer.style.display = "block";
                }
            } else {
                // RESET IT
                isLive = true;
                video.play();
                actionBtn.innerText = "Lock & Rate";
                finalScoreContainer.style.display = "none";
                predictWebcam();
            }
        });

        initializeApp();
    </script>
</body>
</html>
