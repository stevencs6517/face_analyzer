<!DOCTYPE html>
<html>
<head>
    <title>Aesthetics Engine</title>
    <!-- Load MediaPipe via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js"></script>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <div id="results" style="font-size: 24px; font-weight: bold; margin-top: 20px;"></div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        const video = document.getElementById('webcam');
        const resultsDiv = document.getElementById('results');

        // Math helper for Euclidean distance
        function calculateDistance(pt1, pt2) {
            return Math.sqrt(Math.pow(pt2.x - pt1.x, 2) + Math.pow(pt2.y - pt1.y, 2));
        }

        async function initializeApp() {
            // 1. Load the ML Model
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
            const faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numFaces: 1
            });

            // 2. Start the Webcam
            navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", () => predictWebcam(faceLandmarker));
            });
        }

        let lastVideoTime = -1;

        // 3. The Core Loop
        async function predictWebcam(faceLandmarker) {
            let startTimeMs = performance.now();
            
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                
                // Detect the face
                const results = faceLandmarker.detectForVideo(video, startTimeMs);

                if (results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];

                    // Extract our 4 specific points
                    const noseBase = landmarks[2];
                    const upperLip = landmarks[0];
                    const lowerLip = landmarks[17];
                    const chinBase = landmarks[152];

                    // Calculate distances
                    const philtrumLength = calculateDistance(noseBase, upperLip);
                    const chinLength = calculateDistance(lowerLip, chinBase);

                    // Calculate the final ratio
                    const ratio = chinLength / philtrumLength;

                    // Display it
                    resultsDiv.innerText = `Chin-to-Philtrum Ratio: ${ratio.toFixed(2)} : 1`;
                }
            }
            // Loop frame by frame
            window.requestAnimationFrame(() => predictWebcam(faceLandmarker));
        }

        initializeApp();
    </script>
</body>
</html>
