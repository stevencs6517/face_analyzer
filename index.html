<!DOCTYPE html>
<html>
<head>
    <title>Aesthetics Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #ffffff; padding: 20px; }
        #webcam { border-radius: 8px; border: 2px solid #333; max-width: 100%; }
        #results { font-size: 20px; font-weight: bold; margin-top: 20px; line-height: 1.6; }
        .metric { background: #2a2a2a; padding: 10px 15px; margin-bottom: 10px; border-radius: 6px; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <div id="results">Loading Engine...</div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js";

        const video = document.getElementById('webcam');
        const resultsDiv = document.getElementById('results');

        // Math helper for Euclidean distance
        function calculateDistance(pt1, pt2) {
            return Math.sqrt(Math.pow(pt2.x - pt1.x, 2) + Math.pow(pt2.y - pt1.y, 2));
        }

        async function initializeApp() {
            // 1. Load the ML Model
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
            const faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numFaces: 1
            });

            // 2. Start the Webcam
            navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", () => predictWebcam(faceLandmarker));
            });
        }

        let lastVideoTime = -1;

        // 3. The Core Loop
        async function predictWebcam(faceLandmarker) {
            let startTimeMs = performance.now();
            
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                
                // Detect the face
                const results = faceLandmarker.detectForVideo(video, startTimeMs);

                if (results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];

                    // --- CHIN-TO-PHILTRUM RATIO ---
                    const noseBase = landmarks[2];
                    const upperLip = landmarks[0];
                    const lowerLip = landmarks[17];
                    const chinBase = landmarks[152];

                    const philtrumLength = calculateDistance(noseBase, upperLip);
                    const chinLength = calculateDistance(lowerLip, chinBase);
                    const ratio = chinLength / philtrumLength;

                    // --- CANTHAL TILT (LEFT EYE) ---
                    const leftInner = landmarks[133];
                    const leftOuter = landmarks[33];
                    const leftDeltaX = Math.abs(leftOuter.x - leftInner.x);
                    const leftDeltaY = leftInner.y - leftOuter.y; // Inverted Y-axis logic
                    const leftTilt = Math.atan2(leftDeltaY, leftDeltaX) * (180 / Math.PI);

                    // --- CANTHAL TILT (RIGHT EYE) ---
                    const rightInner = landmarks[362];
                    const rightOuter = landmarks[263];
                    const rightDeltaX = Math.abs(rightOuter.x - rightInner.x);
                    const rightDeltaY = rightInner.y - rightOuter.y; // Inverted Y-axis logic
                    const rightTilt = Math.atan2(rightDeltaY, rightDeltaX) * (180 / Math.PI);

                    // --- DISPLAY RESULTS ---
                    resultsDiv.innerHTML = `
                        <div class="metric">Chin-to-Philtrum Ratio: <span style="color: #4ade80">${ratio.toFixed(2)} : 1</span></div>
                        <div class="metric">Left Eye Tilt: <span style="color: #60a5fa">${leftTilt.toFixed(2)}&deg;</span></div>
                        <div class="metric">Right Eye Tilt: <span style="color: #60a5fa">${rightTilt.toFixed(2)}&deg;</span></div>
                    `;
                } else {
                    resultsDiv.innerHTML = "No face detected. Please ensure you are in frame.";
                }
            }
            // Loop frame by frame
            window.requestAnimationFrame(() => predictWebcam(faceLandmarker));
        }

        initializeApp();
    </script>
</body>
</html>
